name: auto-review-extras

# AI critique pass (GLM) + Lighthouse delta + visual-regression with R2-bridged Gemini analysis.
# Runs on PR. Each job is independent and posts a review comment with findings.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: auto-review-extras-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  R2_PUBLIC_BASE: https://pub-a384d181cfdc42a8914ac12cc6ce466b.r2.dev
  R2_BUCKET: qa-screenshots
  R2_ENDPOINT: https://dd94d96614fd27124c3abcecd08ca1f2.r2.cloudflarestorage.com
  CHROME_DEVTOOLS_MCP: https://mcp.preview.softblaze.net:29041/mcp
  GEMINI_MCP: https://mcp.preview.softblaze.net:29002/mcp
  GLM_MCP: https://mcp.preview.softblaze.net:29006/mcp

jobs:
  # === AI critique pass via GLM-5.1 (no throttle) ===
  ai-critique:
    name: ai-critique
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Compute PR diff
        id: diff
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          git diff "$BASE".."$HEAD" -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.py' '*.php' | head -c 30000 > /tmp/diff.txt
          echo "size=$(wc -c < /tmp/diff.txt)" >> "$GITHUB_OUTPUT"
      - name: Critique via GLM-5.1
        id: critique
        if: steps.diff.outputs.size > 100
        run: |
          set +e
          DIFF=$(cat /tmp/diff.txt)
          PROMPT=$(jq -nR --arg d "$DIFF" --arg t "${{ github.event.pull_request.title }}" '
            "You are a staff-level engineer reviewing a pull request. Provide concise, actionable feedback.\n\nPR title: " + $t + "\n\nDiff:\n```\n" + $d + "\n```\n\nReview rules:\n- Identify ARCHITECTURAL or DESIGN issues (not just style).\n- Flag SECURITY risks, RACE CONDITIONS, ERROR-HANDLING gaps.\n- Note any DUPLICATED logic, MAGIC NUMBERS, MISSING TYPES.\n- Skip trivial style/format nits.\n- For each finding: SEVERITY: brief description (file:line if known)\n- Severity: blocker | major | minor\n- Cap at 8 findings, sorted by severity.\n- If clean, respond exactly: \"OK — no critique findings.\"\n\nReturn ONLY the findings."
          ')
          REQ=$(jq -n --argjson p "$PROMPT" '{
            jsonrpc: "2.0", id: 1, method: "tools/call",
            params: { name: "glm_generate", arguments: { prompt: $p, max_tokens: 2000, temperature: 0.2 } }
          }')
          RESP=$(curl -sS --max-time 90 -X POST "$GLM_MCP" \
            -H "Accept: application/json, text/event-stream" \
            -H "Content-Type: application/json" -d "$REQ" \
            | grep -oE 'data:.*' | head -1 | sed 's/^data: //')
          [ -z "$RESP" ] && exit 0
          REVIEW=$(echo "$RESP" | jq -r '.result.content[0].text // empty')
          [ -z "$REVIEW" ] && exit 0
          echo "$REVIEW" > /tmp/critique.md
          echo "review_size=$(wc -c < /tmp/critique.md)" >> "$GITHUB_OUTPUT"
      - name: Post critique
        if: steps.critique.outputs.review_size > 20
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/critique.md', 'utf-8').trim();
            if (review.startsWith('OK — no critique') || review.startsWith('OK - no critique')) return;
            const body = '## 🤖 AI critique (GLM-5.1)\n\n' + review + '\n\n_Advisory; not a merge gate._';
            const prev = (await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number })).data.filter(c => c.user.login === 'github-actions[bot]' && c.body.includes('🤖 AI critique'));
            for (const p of prev) await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: p.id });
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });

  # === Lighthouse delta on preview URL ===
  lighthouse-delta:
    name: lighthouse-delta
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - name: Resolve preview URL
        id: preview
        run: |
          BR=$(echo "${{ github.event.pull_request.head.ref }}" | sed 's|/|-|g' | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "url=https://${BR}.${REPO}.preview.softblaze.net" >> "$GITHUB_OUTPUT"
      - name: Wait for preview
        run: |
          for i in $(seq 1 18); do
            CODE=$(curl -sk --max-time 5 -o /dev/null -w "%{http_code}" "${{ steps.preview.outputs.url }}" || echo 000)
            [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ] || [ "$CODE" = "307" ] && exit 0
            sleep 5
          done
          echo "preview not ready — skip"
          exit 0
      - name: Lighthouse
        id: lh
        run: |
          npx -y -p @lhci/cli@0.13.x lhci collect \
            --url="${{ steps.preview.outputs.url }}" \
            --numberOfRuns=1 \
            --settings.preset=desktop \
            --settings.chromeFlags='--headless=new --no-sandbox' \
            --upload.target=temporary-public-storage 2>&1 | tee /tmp/lhci.log || true
          PERF=$(jq -r '.[0].categories.performance.score' .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          A11Y=$(jq -r '.[0].categories.accessibility.score' .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          SEO=$(jq -r '.[0].categories.seo.score' .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          [ -z "$PERF" ] && PERF=0
          [ -z "$A11Y" ] && A11Y=0
          [ -z "$SEO" ] && SEO=0
          echo "perf=$PERF" >> "$GITHUB_OUTPUT"
          echo "a11y=$A11Y" >> "$GITHUB_OUTPUT"
          echo "seo=$SEO" >> "$GITHUB_OUTPUT"
      - name: Post Lighthouse summary
        if: steps.lh.outputs.perf != ''
        uses: actions/github-script@v7
        with:
          script: |
            const perf = parseFloat('${{ steps.lh.outputs.perf }}') * 100;
            const a11y = parseFloat('${{ steps.lh.outputs.a11y }}') * 100;
            const seo = parseFloat('${{ steps.lh.outputs.seo }}') * 100;
            const url = '${{ steps.preview.outputs.url }}';
            const body = `## 🚦 Lighthouse on ${url}\n\n| | score |\n|---|---|\n| Performance | ${perf.toFixed(0)} |\n| Accessibility | ${a11y.toFixed(0)} |\n| SEO | ${seo.toFixed(0)} |\n\n_Thresholds: perf < 80 fails the job, a11y < 90 warns._`;
            const prev = (await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number })).data.filter(c => c.user.login === 'github-actions[bot]' && c.body.includes('🚦 Lighthouse'));
            for (const p of prev) await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: p.id });
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            if (perf < 80) core.setFailed(`Performance ${perf.toFixed(0)} < 80`);
            if (a11y < 90) core.warning(`Accessibility ${a11y.toFixed(0)} < 90`);

  # === Visual regression: chrome-devtools screenshot → R2 → Gemini analyze ===
  visual-regression:
    name: visual-regression
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - name: Resolve preview URL
        id: preview
        run: |
          BR=$(echo "${{ github.event.pull_request.head.ref }}" | sed 's|/|-|g' | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "url=https://${BR}.${REPO}.preview.softblaze.net" >> "$GITHUB_OUTPUT"
      - name: Verify preview live
        run: |
          CODE=$(curl -sk --max-time 5 -o /dev/null -w "%{http_code}" "${{ steps.preview.outputs.url }}" || echo 000)
          if [ "$CODE" != "200" ] && [ "$CODE" != "307" ] && [ "$CODE" != "302" ]; then
            echo "preview not live ($CODE) — skipping"
            exit 0
          fi
      - name: Capture screenshot via chrome-devtools pool
        id: shot
        run: |
          set -e
          # Initialize MCP session
          INIT=$(curl -sk --max-time 10 -X POST "$CHROME_DEVTOOLS_MCP" \
            -H "Accept: application/json, text/event-stream" -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"vr-ci","version":"1"}}}' \
            -i)
          SESS=$(echo "$INIT" | grep -i "Mcp-Session-Id:" | sed 's/.*: //I' | tr -d '\r\n')
          [ -z "$SESS" ] && { echo "no session"; exit 0; }
          # New page on preview
          curl -sk --max-time 10 -X POST "$CHROME_DEVTOOLS_MCP" \
            -H "Accept: application/json, text/event-stream" -H "Content-Type: application/json" \
            -H "Mcp-Session-Id: $SESS" \
            -d "$(jq -n --arg u "${{ steps.preview.outputs.url }}" '{jsonrpc:"2.0",id:2,method:"tools/call",params:{name:"new_page",arguments:{url:$u}}}')" >/dev/null
          # Screenshot
          SHOT=$(curl -sk --max-time 30 -X POST "$CHROME_DEVTOOLS_MCP" \
            -H "Accept: application/json, text/event-stream" -H "Content-Type: application/json" \
            -H "Mcp-Session-Id: $SESS" \
            -d '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"take_screenshot","arguments":{}}}' \
            | grep -oE 'data:.*' | head -1 | sed 's/^data: //' \
            | jq -r '.result.content[] | select(.type=="image") | .data')
          [ -z "$SHOT" ] && { echo "no shot data"; exit 0; }
          echo "$SHOT" | base64 -d > /tmp/preview.png
          echo "size=$(stat -c%s /tmp/preview.png)" >> "$GITHUB_OUTPUT"
      - name: Upload to R2
        id: upload
        if: steps.shot.outputs.size > 1000
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          KEY="pr/${{ github.repository }}/${{ github.event.pull_request.number }}/run-${{ github.run_id }}.png"
          KEY=$(echo "$KEY" | sed 's|/|_|g; s|^|pr_|')  # flatten
          aws s3 cp /tmp/preview.png "s3://$R2_BUCKET/$KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type image/png 2>&1 | tail -3
          echo "url=$R2_PUBLIC_BASE/$KEY" >> "$GITHUB_OUTPUT"
      - name: Vision analyze via Gemini
        id: vision
        if: steps.upload.outputs.url
        run: |
          REQ=$(jq -n --arg u "${{ steps.upload.outputs.url }}" '{
            jsonrpc: "2.0", id: 1, method: "tools/call",
            params: { name: "gemini_analyze_image", arguments: {
              image_path: $u,
              prompt: "Analyze this UI screenshot. List visual issues with severity (critical/major/minor). Be specific. If the page looks fine, respond exactly: OK — no issues. Max 5 findings."
            }}
          }')
          ANALYSIS=$(curl -sk --max-time 60 -X POST "$GEMINI_MCP" \
            -H "Accept: application/json, text/event-stream" -H "Content-Type: application/json" \
            -d "$REQ" | grep -oE 'data:.*' | head -1 | sed 's/^data: //' | jq -r '.result.content[0].text // empty')
          if [ -z "$ANALYSIS" ]; then
            echo "no analysis — gemini may be throttled, falling back to GLM vision"
            REQ2=$(jq -n --arg u "${{ steps.upload.outputs.url }}" '{
              jsonrpc:"2.0",id:1,method:"tools/call",
              params:{name:"glm_vision",arguments:{
                image_url:$u,
                prompt:"Analyze this UI. List issues with severity. If fine: OK — no issues. Max 5."
              }}
            }')
            ANALYSIS=$(curl -sk --max-time 60 -X POST "$GLM_MCP" \
              -H "Accept: application/json, text/event-stream" -H "Content-Type: application/json" \
              -d "$REQ2" | grep -oE 'data:.*' | head -1 | sed 's/^data: //' | jq -r '.result.content[0].text // empty')
          fi
          echo "$ANALYSIS" > /tmp/vision.md
          echo "size=$(wc -c < /tmp/vision.md)" >> "$GITHUB_OUTPUT"
      - name: Post visual-regression comment
        if: steps.vision.outputs.size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('/tmp/vision.md', 'utf-8').trim();
            const url = '${{ steps.preview.outputs.url }}';
            const shot = '${{ steps.upload.outputs.url }}';
            const isOk = /^OK[ —-]/i.test(analysis);
            const body = `## 📸 Visual regression: ${url}\n\n![preview](${shot})\n\n${analysis}\n\n_Screenshot uploaded to R2 + analyzed via Gemini (fallback: GLM vision)._`;
            const prev = (await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number })).data.filter(c => c.user.login === 'github-actions[bot]' && c.body.includes('📸 Visual regression'));
            for (const p of prev) await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: p.id });
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            // Fail on critical findings
            if (/critical/i.test(analysis) && !isOk) core.setFailed('Visual regression: critical findings detected');
