# bot-review-gate.yml — required-status check that fails when bots have
# unresolved Major/High/Medium findings AND/OR when typecheck/build fails.
#
# Drop into .github/workflows/bot-review-gate.yml in each repo. The job names
# (`bot-review-check`, `typecheck`) become required statuses on the branch
# protection rule.
#
# Generated 2026-05-03 — see /home/devops/healthcheck/patches/install-bot-review-gate.sh
# for an installer that drops this into the canonical workflow path per repo.

name: bot-review-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

# Cancel previous runs on the same PR so we always evaluate the latest state
concurrency:
  group: bot-review-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # === L3: typecheck gate (build-green) ===
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: |
          if grep -q '"typecheck"' package.json; then
            pnpm -w typecheck 2>/dev/null || pnpm typecheck
          else
            npx tsc --noEmit
          fi

  # === Bot-review thread evaluation ===
  bot-review-check:
    name: bot-review-check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check bot review threads
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request || (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            })).data;

            // GraphQL: fetch all review threads + their comments + resolution state
            const q = `query($owner:String!, $repo:String!, $num:Int!) {
              repository(owner:$owner, name:$repo) {
                pullRequest(number:$num) {
                  reviewThreads(first: 100) {
                    nodes {
                      isResolved
                      isOutdated
                      comments(first: 50) {
                        nodes { author { login } body }
                      }
                    }
                  }
                }
              }
            }`;
            const data = await github.graphql(q, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              num: pr.number,
            });
            const threads = data.repository.pullRequest.reviewThreads.nodes;

            const blockers = [];
            for (const t of threads) {
              if (t.isResolved || t.isOutdated) continue;
              for (const c of t.comments.nodes) {
                const login = (c.author?.login || '').toLowerCase();
                const body = (c.body || '');
                const isCodeRabbit = login.includes('coderabbit');
                const isCursor = login.includes('cursor');
                if (!isCodeRabbit && !isCursor) continue;
                // Severity tags
                if (isCodeRabbit && /(🟠|🔴|⚠️\s*\*?\*?(?:major|critical))/i.test(body)) {
                  blockers.push({ bot: 'CodeRabbit', body: body.slice(0, 200) });
                  break;
                }
                if (isCursor && /(severity:\s*(?:high|medium))/i.test(body)) {
                  blockers.push({ bot: 'Cursor', body: body.slice(0, 200) });
                  break;
                }
              }
            }

            if (blockers.length) {
              core.setFailed(`${blockers.length} unresolved bot finding(s):\n` +
                blockers.map(b => `[${b.bot}] ${b.body}`).join('\n---\n'));
            } else {
              console.log('OK — no blocking bot threads');
            }
